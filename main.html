<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝐒𝐀𝐊𝐔𝐓𝐀 𝐌𝐃</title>
<link rel="icon" href="https://url.bmbxmd.workers.dev/1783951975745.jpg" type="image/jpg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>

    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0e14;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(200, 100, 255, 0.04) 0%, transparent 60%),
                  radial-gradient(circle at 70% 80%, rgba(168, 85, 247, 0.04) 0%, transparent 50%);
      animation: bgFloat 25s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes bgFloat {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-5%, -5%) rotate(5deg); }
    }

    /* ===== CONTAINER ===== */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: linear-gradient(145deg, rgba(22, 27, 34, 0.92), rgba(13, 17, 23, 0.96));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 2.8rem 2rem 2.2rem;
      border-radius: 3rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 
        0 30px 80px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(200, 100, 255, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      text-align: center;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .container:hover {
      box-shadow: 
        0 40px 100px rgba(0, 0, 0, 0.8),
        0 0 0 2px var(--glow-color, rgba(200, 100, 255, 0.08)),
        0 0 60px var(--glow-color, rgba(200, 100, 255, 0.05));
    }

    /* ===== GLOW BORDER ===== */
    .container::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border-radius: 3.2rem;
      background: linear-gradient(135deg, var(--border-color1, rgba(200, 100, 255, 0.15)), transparent 40%, transparent 60%, var(--border-color2, rgba(200, 100, 255, 0.10)));
      z-index: -1;
      opacity: 0.5;
      transition: opacity 0.5s ease;
    }

    .container:hover::before {
      opacity: 1;
    }

    /* ===== LOGO ===== */
    .logo-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 0.2rem;
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      filter: drop-shadow(0 0 30px var(--logo-glow, rgba(200, 100, 255, 0.2)));
      animation: logoPulse 3s ease-in-out infinite;
      transition: transform 0.3s ease;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .logo:hover {
      transform: scale(1.08) rotate(-5deg);
    }

    @keyframes logoPulse {
      0%, 100% { filter: drop-shadow(0 0 20px var(--logo-glow, rgba(200, 100, 255, 0.15))); }
      50% { filter: drop-shadow(0 0 45px var(--logo-glow, rgba(200, 100, 255, 0.35))); }
    }

    .logo-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1.5px solid var(--ring-color, rgba(200, 100, 255, 0.10));
      animation: ringSpin 8s linear infinite;
    }

    @keyframes ringSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ===== TITLE ===== */
    .title {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--grad1, #c864ff), var(--grad2, #a855f7), var(--grad3, #7c3aed));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradShift 4s ease-in-out infinite;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 60px var(--title-glow, rgba(200, 100, 255, 0.10));
    }

    @keyframes gradShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ===== SUBTITLE ===== */
    .sub {
      color: rgba(139, 148, 158, 0.8);
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .sub span {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.2rem 0.9rem;
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(139, 148, 158, 0.6);
    }

    /* ===== DATETIME ===== */
    .datetime-container {
      margin: 8px 0 15px;
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      display: inline-block;
      min-width: 240px;
    }

    .datetime-container .date {
      color: rgba(139, 148, 158, 0.7);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .datetime-container .time {
      color: var(--grad1, #c864ff);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(200, 100, 255, 0.15);
      margin-top: 2px;
    }

    .datetime-container .time .ampm {
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(139, 148, 158, 0.6);
      margin-left: 4px;
      letter-spacing: 1px;
    }

    .datetime-container .time span {
      display: inline-block;
      min-width: 30px;
    }

    .datetime-container .time .separator {
      min-width: 8px;
      color: rgba(139, 148, 158, 0.3);
    }

    /* ===== COLOR PICKER ===== */
    .color-picker-section {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .color-picker-section label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(139, 148, 158, 0.6);
      margin-bottom: 0.5rem;
    }

    .color-options {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .color-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .color-btn:hover {
      transform: scale(1.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .color-btn.active {
      border-color: white;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      transform: scale(1.1);
    }

    .color-btn .check {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.1rem;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .color-btn.active .check {
      opacity: 1;
    }

    /* ===== PAIR FORM ===== */
    .pair-form {
      text-align: left;
      margin-top: 0.5rem;
    }

    .pair-form label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--blan, #f0f6fc);
      font-weight: 500;
      font-size: 0.9rem;
    }

    .pair-form input {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 1.2rem;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.06);
      color: var(--blan, #f0f6fc);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .pair-form input:focus {
      outline: none;
      border-color: var(--grad1, #c864ff);
      box-shadow: 0 0 0 4px rgba(200, 100, 255, 0.15);
      background: rgba(255, 255, 255, 0.09);
    }

    .pair-form input::placeholder {
      color: rgba(139, 148, 158, 0.5);
    }

    .btn-pair {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--btn1, #c864ff), var(--btn2, #7c3aed));
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 6px 25px var(--btn-shadow, rgba(200, 100, 255, 0.25));
      letter-spacing: 0.5px;
      font-family: 'Inter', sans-serif;
    }

    .btn-pair:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 35px var(--btn-shadow, rgba(200, 100, 255, 0.4));
      background: linear-gradient(135deg, var(--btn2, #7c3aed), var(--btn1, #c864ff));
    }

    .btn-pair:active {
      transform: scale(0.97);
    }

    /* ===== RESULT ===== */
    .result-box {
      margin-top: 1.5rem;
      padding: 1.2rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .result-box .code-display {
      cursor: pointer;
      padding: 10px 24px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      transition: all 0.3s ease;
      display: inline-block;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--grad1, #c864ff);
    }

    .result-box .code-display:hover {
      background: rgba(200, 100, 255, 0.1);
      transform: scale(1.05);
    }

    .result-box .code-display .code-value {
      color: var(--blan, #f0f6fc);
    }

    .result-box .error-text {
      color: #ff6b6b;
      font-weight: 600;
    }

    .result-box .loading-text {
      color: var(--grad1, #c864ff);
      font-weight: 500;
      animation: pulseText 1.5s ease-in-out infinite;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ===== FOOTER ===== */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 1.8rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      color: rgba(110, 118, 129, 0.6);
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }

    .footer .heart {
      color: #ff6b6b;
      animation: heartBeat 1.5s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    .footer strong {
      font-weight: 500;
      background: linear-gradient(135deg, var(--footer1, #c864ff), var(--footer2, #a855f7));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* ===== MATRIX CANVAS ===== */
    canvas#matrix {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.3;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.2rem 1.8rem;
        border-radius: 2rem;
      }
      .title {
        font-size: 1.8rem;
      }
      .logo {
        width: 70px;
        height: 70px;
      }
      .color-btn {
        width: 32px;
        height: 32px;
      }
      .pair-form input {
        padding: 12px 14px;
        font-size: 0.9rem;
      }
      .btn-pair {
        padding: 14px;
        font-size: 1rem;
      }
      .datetime-container .time {
        font-size: 1.1rem;
      }
      .datetime-container .date {
        font-size: 0.7rem;
      }
      .datetime-container .time .ampm {
        font-size: 0.65rem;
      }
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0d1117;
    }
    ::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #484f58;
    }
  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
  <script>
    // ===== MATRIX EFFECT =====
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "01XɅƬⲘⲊⲒⲚⲀⲔⲞⲦⲈⲀⲊⲞⲀⲦ";
    const fontSize = 18;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffdf00";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
          drops[i] = 0;
        drops[i]++;
      }
    }

    setInterval(draw, 33);
    window.addEventListener('resize', () => {
      canvas.height = window.innerHeight;
      canvas.width = window.innerWidth;
    });

    // ===== DATE/TIME UPDATE =====
    function updateDateTime() {
      const now = new Date();
      const dateOpts = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      };
      document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', dateOpts);
      
      let hours = now.getHours();
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = minutes;
      document.getElementById('seconds').textContent = seconds;
      document.getElementById('ampm').textContent = ampm;
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);

    // ===== COLOR THEME SYSTEM =====
    const themes = {
      purple: {
        '--glow-color': 'rgba(200, 100, 255, 0.15)',
        '--border-color1': 'rgba(200, 100, 255, 0.20)',
        '--border-color2': 'rgba(200, 100, 255, 0.15)',
        '--logo-glow': 'rgba(200, 100, 255, 0.3)',
        '--ring-color': 'rgba(200, 100, 255, 0.15)',
        '--grad1': '#c864ff',
        '--grad2': '#a855f7',
        '--grad3': '#7c3aed',
        '--title-glow': 'rgba(200, 100, 255, 0.15)',
        '--btn1': '#c864ff',
        '--btn2': '#7c3aed',
        '--btn-shadow': 'rgba(200, 100, 255, 0.25)',
        '--footer1': '#c864ff',
        '--footer2': '#a855f7',
        '--blan': '#f0f6fc',
        '--gri-klere': '#8b949e'
      },
      cyan: {
        '--glow-color': 'rgba(0, 255, 255, 0.08)',
        '--border-color1': 'rgba(0, 255, 255, 0.15)',
        '--border-color2': 'rgba(0, 255, 255, 0.10)',
        '--logo-glow': 'rgba(0, 255, 255, 0.2)',
        '--ring-color': 'rgba(0, 255, 255, 0.10)',
        '--grad1': '#00ffff',
        '--grad2': '#00b4ff',
        '--grad3': '#7b61ff',
        '--title-glow': 'rgba(0, 255, 255, 0.10)',
        '--btn1': '#00ffff',
        '--btn2': '#00ccdd',
        '--btn-shadow': 'rgba(0, 255, 255, 0.15)',
        '--footer1': '#58a6ff',
        '--footer2': '#00ffff',
        '--blan': '#f0f6fc',
        '--gri-klere': '#8b949e'
      },
      pink: {
        '--glow-color': 'rgba(244, 114, 182, 0.15)',
        '--border-color1': 'rgba(244, 114, 182, 0.20)',
        '--border-color2': 'rgba(244, 114, 182, 0.15)',

      orange: {
        '--glow-color': 'rgba(251, 146, 60, 0.15)',
        '--border-color1': 'rgba(251, 146, 60, 0.20)',
        '--border-color2': 'rgba(251, 146, 60, 0.15)',
        '--logo-glow': 'rgba(251, 146, 60, 0.3)',
        '--ring-color': 'rgba(251, 146, 60, 0.15)',
        '--grad1': '#fb923c',
        '--grad2': '#f97316',
        '--grad3': '#ea580c',
        '--title-glow': 'rgba(251, 146, 60, 0.15)',
        '--btn1': '#fb923c',
        '--btn2': '#f97316',
        '--btn-shadow': 'rgba(251, 146, 60, 0.25)',
        '--footer1': '#fb923c',
        '--footer2': '#f97316',
        '--blan': '#f0f6fc',
        '--gri-klere': '#8b949e'
      },
      red: {
        '--glow-color': 'rgba(248, 113, 113, 0.15)',
        '--border-color1': 'rgba(248, 113, 113, 0.20)',
        '--border-color2': 'rgba(248, 113, 113, 0.15)',
        '--logo-glow': 'rgba(248, 113, 113, 0.3)',
        '--ring-color': 'rgba(248, 113, 113, 0.15)',
        '--grad1': '#f87171',
        '--grad2': '#ef4444',
        '--grad3': '#dc2626',
        '--title-glow': 'rgba(248, 113, 113, 0.15)',
        '--btn1': '#f87171',
        '--btn2': '#ef4444',
        '--btn-shadow': 'rgba(248, 113, 113, 0.25)',
        '--footer1': '#f87171',
        '--footer2': '#ef4444',
        '--blan': '#f0f6fc',
        '--gri-klere': '#8b949e'
      }
    };

    const container = document.getElementById('app');

    function applyTheme(themeName) {
      const theme = themes[themeName];
      if (!theme) return;

      Object.keys(theme).forEach(key => {
        container.style.setProperty(key, theme[key]);
      });

      document.querySelectorAll('.color-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === themeName);
      });

      localStorage.setItem('sakuta-theme', themeName);
    }

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        applyTheme(this.dataset.theme);
      });
    });

    const savedTheme = localStorage.getItem('sakuta-theme') || 'purple';
    applyTheme(savedTheme);

    // ===== PAIR CODE FUNCTION =====
    const submitBtn = document.getElementById("submitBtn");
    const numberInput = document.getElementById("number");
    const resultBox = document.getElementById("resultBox");

    submitBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      
      const number = numberInput.value.replace(/[^0-9]/g, "");
      if (!number || number.length < 10) {
        resultBox.innerHTML = '<span class="error-text">❌ Please enter a valid phone number</span>';
        return;
      }

      resultBox.innerHTML = '<span class="loading-text">⏳ Fetching code...</span>';

      try {
        const { data } = await axios.get(`/code?number=${number}`);
        const code = data.code || "Unavailable";

        resultBox.innerHTML = `
          <div class="code-display" onclick="copyCode('${code}')">
            <span style="color: var(--grad1);">🔑 CODE: </span>
            <span class="code-value">${code}</span>
            <span style="color: rgba(139,148,158,0.5); font-size: 0.7rem; display: block; margin-top: 4px;">👆 Click to copy</span>
          </div>
        `;
      } catch (err) {
        console.error(err);
        resultBox.innerHTML = '<span class="error-text">⚠️ Failed to fetch code. Please try again later.</span>';
      }
    });

    window.copyCode = function(code) {
      navigator.clipboard.writeText(code).then(() => {
        const display = document.querySelector('.code-display');
        if (display) {
          const original = display.innerHTML;
          display.innerHTML = '<span style="color: #34d399;">✅ Code copied!</span>';
          setTimeout(() => {
            display.innerHTML = original;
          }, 2000);
        }
      }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = code;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        
        const display = document.querySelector('.code-display');
        if (display) {
          const original = display.innerHTML;
          display.innerHTML = '<span style="color: #34d399;">✅ Code copied!</span>';
          setTimeout(() => {
            display.innerHTML = original;
          }, 2000);
        }
      });
    };

    numberInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        submitBtn.click();
      }
    });
  </script>
</body>
</html>
